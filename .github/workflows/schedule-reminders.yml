name: Schedule Reminders

# Run every 5 minutes
on:
  schedule:
    - cron: '*/5 * * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Trigger DayForge scheduleReminder Function
        run: |
          curl -X POST \
            'https://bqirtdlfjqikmovlwqyx.supabase.co/functions/v1/scheduleReminder' \
            -H 'Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{}' \
            -w '\nStatus: %{http_code}\n'
      
      - name: Log execution
        run: echo '? Reminder scheduler executed at '$(date)
